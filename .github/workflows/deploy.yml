name: Deploy backend
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-26.04
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/dobox_backend
            git pull
            docker compose up -d --build
